<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Browser Launcher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #111;
      color: #eee;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      background: #1c1c1c;
      padding: 24px;
      border-radius: 12px;
    }
    h1 {
      margin-top: 0;
      font-size: 24px;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.95;
    }
    #status {
      margin-top: 14px;
      color: #bbb;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Proxy Browser</h1>

    <label>Proxy Host / IP</label>
    <input id="host" placeholder="123.123.123.123 or yourdomain.com" />

    <label>Proxy Port</label>
    <input id="port" placeholder="8080" />

    <label>Proxy Username</label>
    <input id="username" placeholder="optional" />

    <label>Proxy Password</label>
    <input id="password" type="password" placeholder="optional" />

    <label>Start URL</label>
    <input id="startUrl" value="https://example.com" />

    <button id="launchBtn">Launch Browser</button>

    <div id="status"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
