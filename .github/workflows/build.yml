name: Build macOS App

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify install
        run: ls -la

      - name: Build macOS app (verbose)
        run: npx electron-builder --mac --verbose

      - name: Show dist contents
        run: ls -R dist || echo "no dist folder"

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: ProxyBrowser-mac
          path: dist/mac
